# Alertmanager — 데모랩 Lab (실제 발송 없음, webhook 수신만)
global:
  resolve_timeout: 5m

route:
  receiver: lab-webhook
  group_by: ["alertname", "job"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: lab-webhook
    webhook_configs:
      - url: "http://alert_sink:9999/"
        send_resolved: true

# 프로덕션 예시: route matchers로 severity별 Slack/PagerDuty 분기
