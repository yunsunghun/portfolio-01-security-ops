# Alertmanager — 데모랩 Lab
# critical / 기타 라우트 분기. Lab에서는 동일 webhook(실제 발송 없음).
global:
  resolve_timeout: 5m

route:
  receiver: lab-webhook-warning
  group_by: ["alertname", "job"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: lab-webhook-critical
      continue: false

receivers:
  - name: lab-webhook-critical
    webhook_configs:
      - url: "http://alert_sink:9999/"
        send_resolved: true
  - name: lab-webhook-warning
    webhook_configs:
      - url: "http://alert_sink:9999/"
        send_resolved: true
