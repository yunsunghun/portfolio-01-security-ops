services:
  portal:
    image: nginx:1.25-alpine
    volumes:
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./portal/site:/usr/share/nginx/html:ro

  blackbox:
    image: quay.io/prometheus/blackbox-exporter:v0.25.0
    command:
      - "--config.file=/config/blackbox.yml"
    volumes:
      - ./blackbox/blackbox.yml:/config/blackbox.yml:ro

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROM_PORT:-9090}:9090"
    depends_on:
      - portal
      - blackbox

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-demolab}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-demolab-grafana}
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
