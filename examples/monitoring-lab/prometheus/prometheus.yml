# 데모랩 — Prometheus (교육용 Lab)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          tenant: demolab
          env: lab

  - job_name: blackbox-portal
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://portal/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Blackbox exporter 자체 메트릭 (항상 컨테이너망에서 수집 가능)
  - job_name: blackbox-exporter
    static_configs:
      - targets: ["blackbox:9115"]
        labels:
          tenant: demolab
          env: lab

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]
        labels:
          tenant: demolab
          env: lab
