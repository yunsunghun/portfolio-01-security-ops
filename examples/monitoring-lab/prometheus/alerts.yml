# Prometheus м•ҢлҰј к·ңм№ҷ вҖ” Lab (AlertmanagerлЎң м „лӢ¬)
groups:
  - name: demolab_portal
    rules:
      - alert: PortalHealthProbeFailed
        expr: probe_success{job="blackbox-portal"} == 0
        for: 1m
        labels:
          severity: critical
          tenant: demolab
        annotations:
          summary: "DL-PORTAL /health н”„лЎңлёҢ мӢӨнҢЁ"
          description: "Blackbox probeк°Җ 1л¶„ мқҙмғҒ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. лҹ°л¶Ғ RB-01 м°ёкі ."

      - alert: PortalHealthProbeSlow
        expr: probe_duration_seconds{job="blackbox-portal"} > 2
        for: 5m
        labels:
          severity: warning
          tenant: demolab
        annotations:
          summary: "н”„лЎңлёҢ м§Җм—° 2мҙҲ мҙҲкіј"
          description: "л„ӨнҠёмӣҢнҒ¬ лҳҗлҠ” upstream м§Җм—° мқҳмӢ¬(Lab)."
