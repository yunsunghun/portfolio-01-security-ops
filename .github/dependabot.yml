# Dependabot — Docker 이미지·GitHub Actions 주간 점검
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/examples/monitoring-lab"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/examples/demo-stack"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
