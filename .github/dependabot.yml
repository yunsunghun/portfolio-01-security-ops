# Dependabot — Docker 이미지 태그 주간 점검
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/examples/monitoring-lab"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/examples/demo-stack"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
