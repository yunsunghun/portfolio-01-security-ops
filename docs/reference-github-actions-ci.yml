# GitHub Actions CI 정의 (참고용)
# 사용법: `gh auth refresh -h github.com -s workflow` 로 workflow 권한을 연 뒤
# 이 파일을 복사해 `.github/workflows/ci.yml` 로 두고 커밋·푸시하면 Actions가 실행됩니다.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq shellcheck
      - name: Run ShellCheck
        run: shellcheck automation/scripts/*.sh

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: fmt check
        run: terraform fmt -check -recursive
      - name: init & validate
        run: |
          terraform init -backend=false
          terraform validate
