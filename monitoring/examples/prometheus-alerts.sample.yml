# Prometheus 알림 규칙 샘플 (관측성 확장 시 참고)
# 실제 적용 시: recording rules, label cardinality 주의
groups:
  - name: demo_service
    rules:
      - alert: DemoHealthcheckFailing
        expr: probe_success{job="demo"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "데모 헬스체크 실패"
          description: "2분 이상 헬스 프로브가 실패했습니다. 런북 RB-01을 따르세요."
